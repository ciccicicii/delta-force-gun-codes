<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三角洲行动改枪码</title>
  <meta
    name="description"
    content="三角洲行动改枪码查询站，支持搜索、枪械筛选、来源筛选、预算筛选与一键复制。"
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-scene" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="./bg-anime.mp4" type="video/mp4">
    </video>
    <div class="bg-video-overlay"></div>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <div class="page-shell">
    <header class="hero">
      <div class="hero-panel hero-panel-wide">
        <div class="hero-card hero-card-feature hero-card-status">
          <strong id="syncDate">读取中</strong>
          <small>步枪数据</small>
        </div>
        <div class="hero-grid" id="heroStats"></div>
        <div class="hero-actions">
          <button class="button button-secondary" type="button" id="randomPick">随机</button>
        </div>
      </div>
    </header>

    <main>
      <section class="section section-codes" id="codes">
        <div class="section-top">
          <button class="button button-secondary" id="openUploadModal" type="button">上传改枪码</button>
          <button class="ghost-button" id="clearFilters" type="button">清空筛选</button>
        </div>

        <div class="control-shell">
          <div class="type-filter-row" id="weaponTypeFilter"></div>

          <div class="control-bar">
            <label class="search">
              <span>关键词</span>
              <input id="searchInput" type="search" placeholder="枪名 / 描述 / 改枪码">
            </label>

            <label class="select">
              <span>武器</span>
              <div class="custom-select" id="weaponSelect"></div>
            </label>

            <label class="select">
              <span>来源</span>
              <div class="custom-select" id="sourceSelect"></div>
            </label>
          </div>

          <div class="filter-row">
            <div class="tier-filter" id="tierFilter"></div>
            <label class="toggle">
              <input id="includeUnknown" type="checkbox">
              <span>显示待识别数据</span>
            </label>
          </div>
        </div>

        <div class="content-grid">
          <aside class="sidebar">
            <div class="panel">
              <div class="panel-heading">
                <span>Top</span>
              </div>
              <div id="weaponRanking" class="ranking-list"></div>
            </div>

            <div class="panel">
              <div class="panel-heading">
                <span>Budget</span>
              </div>
              <div id="budgetAdvice" class="advice-list"></div>
            </div>
          </aside>

          <div class="results-column">
            <div class="results-meta">
              <p id="resultSummary">正在读取数据...</p>
            </div>
            <div id="results" class="card-grid"></div>
            <div id="emptyState" class="empty-state" hidden>
              <h3>没有匹配结果</h3>
              <p>换个关键词，或者清空筛选后再看。</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-shell" id="uploadModal" hidden>
    <div class="modal-backdrop" id="uploadModalBackdrop"></div>
    <section class="modal-panel upload-section" aria-modal="true" aria-labelledby="uploadModalTitle" role="dialog">
      <div class="upload-head">
        <div>
          <h2 class="upload-title" id="uploadModalTitle">上传改枪码</h2>
          <p class="upload-note">当前版本会直接写入项目 JSON，提交后会立即并入当前列表。</p>
        </div>
        <div class="modal-actions">
          <p class="upload-status" id="uploadStatus">未提交</p>
          <button class="ghost-button modal-close" id="closeUploadModal" type="button">关闭</button>
        </div>
      </div>

      <form class="upload-form" id="uploadForm">
        <label class="select">
          <span>武器类别</span>
          <div class="custom-select" id="uploadWeaponTypeSelect"></div>
        </label>

        <label class="select">
          <span>武器名称</span>
          <div class="custom-select" id="uploadWeaponSelect"></div>
        </label>

        <label class="search">
          <span>改枪码</span>
          <input id="uploadBuildCode" type="text" maxlength="120" placeholder="输入改枪码" required>
        </label>

        <label class="search">
          <span>改装描述</span>
          <input id="uploadDescription" type="text" maxlength="80" placeholder="例如：中距离通用方案">
        </label>

        <label class="search">
          <span>价格</span>
          <input id="uploadPrice" type="text" maxlength="20" placeholder="例如：25万">
        </label>

        <div class="upload-actions">
          <button class="button button-primary" type="submit">提交改枪码</button>
          <button class="ghost-button" id="uploadReset" type="button">清空表单</button>
        </div>
      </form>
    </section>
  </div>

  <template id="resultCardTemplate">
    <article class="result-card">
      <div class="card-topline">
        <div class="card-badges">
          <span class="status-pill"></span>
          <span class="price-pill"></span>
        </div>
      </div>
      <h3 class="weapon-name"></h3>
      <h3 class="build-title"></h3>
      <p class="build-code"></p>
      <div class="card-meta"></div>
      <div class="card-actions">
        <button class="copy-button" type="button">复制改枪码</button>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
